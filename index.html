<!DOCTYPE html>
<html>
<head>
  <title>Online Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>My Online Store</h1>

  <!-- Search -->
  <input type="text" placeholder="Search product..." onkeyup="searchProduct(this.value)">

  <!-- Categories -->
  <div id="categories">
    <button onclick="filterCategory('all')">All</button>
    <button onclick="filterCategory('electronics')">Electronics</button>
    <button onclick="filterCategory('fashion')">Fashion</button>
    <button onclick="filterCategory('cosmetics')">Cosmetics</button>
  </div>

  <!-- Sorting -->
  <select onchange="sortProducts(this.value)">
    <option value="">Sort By</option>
    <option value="low">Price Low to High</option>
    <option value="high">Price High to Low</option>
  </select>

  <!-- Filters -->
  <button onclick="filterRating()">4+ Rating</button>

  <!-- Cart -->
  <h3>Cart: <span id="cartCount">0</span></h3>

  <!-- Products -->
  <div id="products"></div>

  <script src="script.js"></script>
</body>
</html>
